  #     BACKUP_RETENTION_DAYS: "${BACKUP_RETENTION_DAYS:-7}"
  #   volumes:
  #     - ./backups:/backups
  #   entrypoint: ["/bin/bash", "-c"]
  #   command:
  #     - |
  #       echo "Backup service started. Running backup every 24 hours."
  #       while true; do
  #         ts=$$(date +%Y%m%d_%H%M%S)
  #         echo "[$$(date)] Creating backup..."
  #         pg_dump -h yugabytedb -p 5433 -U yugabyte ilhrf_data_collection --no-owner --no-acl | gzip > /backups/ilhrf_data_collection_$$ts.sql.gz && echo "[$$(date)] Backup created" || echo "[$$(date)] Backup failed"
  #         find /backups -name "ilhrf_data_collection_*.sql.gz" -mtime +$${BACKUP_RETENTION_DAYS:-7} -delete 2>/dev/null || true
  #         sleep 86400
  #       done
  #   depends_on:
  #     yugabyte_data_node2:
  #       condition: service_healthy
  #   restart: unless-stopped
