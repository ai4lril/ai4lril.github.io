services:
  # Dragonfly Cache (High-performance Redis alternative)
  # BullMQ compatibility: --cluster_mode=emulated --lock_on_hashtags enables
  # Lua script execution with queue hashtags (see queue.module.ts)
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: ilhrf-data-dragonfly
    command:
      [
        "--port=6379",
        "--cache_mode=yes",
        "--maxmemory=64GB",
        "--cluster_mode=emulated",
        "--lock_on_hashtags",
      ]
    ports:
      - "6378:6379" # Dragonfly on port 6378 to avoid conflict with YEDIS
    volumes:
      - dragonfly_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64GB
        reservations:
          memory: 32GB
    networks:
      - ilhrf-data-network

  # SeaweedFS for blob storage (S3-compatible)
  seaweedfs-master:
    image: chrislusf/seaweedfs:latest
    container_name: ilhrf-data-seaweedfs-master
    command: master -ip=seaweedfs-master -ip.bind=0.0.0.0 -port=9333
    ports:
      - "9333:9333"
      - "19333:19333"
    volumes:
      - seaweedfs_master_data:/data
    restart: unless-stopped
    healthcheck:
      test:
        ["CMD", "wget", "-q", "-O", "-", "http://localhost:9333/cluster/status"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ilhrf-data-network

  seaweedfs-volume:
    image: chrislusf/seaweedfs:latest
    container_name: ilhrf-data-seaweedfs-volume
    command: volume -ip=seaweedfs-volume -master=seaweedfs-master:9333 -ip.bind=0.0.0.0 -port=8080 -dir=/data
    ports:
      - "8088:8080"
    volumes:
      - seaweedfs_volume_data:/data
    depends_on:
      seaweedfs-master:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - ilhrf-data-network

  seaweedfs-filer:
    image: chrislusf/seaweedfs:latest
    container_name: ilhrf-data-seaweedfs-filer
    command: filer -ip=seaweedfs-filer -master=seaweedfs-master:9333 -ip.bind=0.0.0.0 -port=8888
    ports:
      - "8888:8888"
    depends_on:
      - seaweedfs-master
      - seaweedfs-volume
    restart: unless-stopped
    networks:
      - ilhrf-data-network

  seaweedfs-s3:
    image: chrislusf/seaweedfs:latest
    container_name: ilhrf-data-seaweedfs-s3
    environment:
      AWS_ACCESS_KEY_ID: s3admin
      AWS_SECRET_ACCESS_KEY: s3secret
    command: s3 -filer=seaweedfs-filer:8888 -ip.bind=0.0.0.0 -port=8333
    ports:
      - "8333:8333"
    depends_on:
      - seaweedfs-filer
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8333/"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - ilhrf-data-network

  # TimeScaleDB for time-series data
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: ilhrf-data-timescaledb
    environment:
      POSTGRES_DB: timescale
      POSTGRES_USER: timescale
      POSTGRES_PASSWORD: timescale
    ports:
      - "5436:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timescale -d timescale"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ilhrf-data-network

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: ilhrf-data-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ilhrf-data-network

  # Grafana for monitoring dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: ilhrf-data-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel
      # Allow provisioning to handle stale datasource refs (fixes "data source not found")
      GF_PROVISIONING_DATASOURCES_ALLOW_DELETE: "true"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - ilhrf-data-network

  # YugaByteDB (default database)
  yugabytedb-node1:
    image: yugabytedb/yugabyte:latest
    container_name: ilhrf-yugabyte-node1
    hostname: ilhrf-yugabyte-node1
    command: >
      yugabyted start
      --advertise_address=ilhrf-yugabyte-node1
      --base_dir=/home/yugabyte/yb_data
      --tserver_flags=ysql_pg_conf_csv="yb_silence_advisory_locks_not_supported_error=on"
      --background=false
    ports:
      - "5433:5433" # YSQL port
      - "9042:9042" # YCQL port
      - "6379:6379" # YEDIS port
      - "7001:7000" # Master HTTP
      - "9000:9000" # tserver HTTP
      - "15433:15433" # YugabyteDB UI
    volumes:
      - yugabyte_data_node1:/home/yugabyte/yb_data
    restart: unless-stopped
    networks:
      - ilhrf-data-network

  # Ensures ilhrf_data_collection database exists before backend runs migrations
  db-init:
    image: yugabytedb/yugabyte:latest
    container_name: ilhrf-data-db-init
    environment:
      PGPASSWORD: yugabyte
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        for i in $$(seq 1 30); do
          bin/ysqlsh -h yugabytedb-node1 -U yugabyte -d yugabyte -c "SELECT 1 FROM pg_database WHERE datname='ilhrf_data_collection'" -t 2>/dev/null | grep -q 1 && echo "Database exists" && break
          bin/ysqlsh -h yugabytedb-node1 -U yugabyte -d yugabyte -c "CREATE DATABASE ilhrf_data_collection" 2>/dev/null && echo "Database created" && break
          echo "Waiting for YugaByteDB... $$i/30"; sleep 2
        done
        bin/ysqlsh -h yugabytedb-node1 -U yugabyte -d yugabyte -c "SELECT 1 FROM pg_database WHERE datname='ilhrf_data_collection'" -t 2>/dev/null | grep -q 1 || (echo "Failed to create database"; exit 1)
        bin/ysqlsh -h yugabytedb-node1 -U yugabyte -d yugabyte -c "ALTER DATABASE ilhrf_data_collection SET yb_silence_advisory_locks_not_supported_error=on" 2>/dev/null && echo "Advisory locks GUC set" || true
        exit 0
    depends_on:
      yugabytedb-node1:
        condition: service_started
    networks:
      - ilhrf-data-network
    restart: "no"

  yugabytedb-node2:
    image: yugabytedb/yugabyte:latest
    container_name: ilhrf-yugabyte-node2
    hostname: ilhrf-yugabyte-node2
    command: >
      yugabyted start
      --advertise_address=ilhrf-yugabyte-node2
      --join=ilhrf-yugabyte-node1
      --base_dir=/home/yugabyte/yb_data
      --tserver_flags=ysql_pg_conf_csv="yb_silence_advisory_locks_not_supported_error=on"
      --background=false
    ports:
      - "5434:5433" # optional external YSQL for node2
    volumes:
      - yugabyte_data_node2:/home/yugabyte/yb_data
    restart: unless-stopped
    networks:
      - ilhrf-data-network

  yugabytedb-node3:
    image: yugabytedb/yugabyte:latest
    container_name: ilhrf-yugabyte-node3
    hostname: ilhrf-yugabyte-node3
    command: >
      yugabyted start
      --advertise_address=ilhrf-yugabyte-node3
      --join=ilhrf-yugabyte-node1
      --base_dir=/home/yugabyte/yb_data
      --tserver_flags=ysql_pg_conf_csv="yb_silence_advisory_locks_not_supported_error=on"
      --background=false
    ports:
      - "5435:5433" # optional external YSQL for node3
    volumes:
      - yugabyte_data_node3:/home/yugabyte/yb_data
    restart: unless-stopped
    networks:
      - ilhrf-data-network

  puppygraph:
    image: puppygraph/puppygraph:stable
    pull_policy: always
    container_name: ilhrf-data-puppygraph
    environment:
      - PUPPYGRAPH_USERNAME=ilhrf
      - PUPPYGRAPH_PASSWORD=puppygraph123
    networks:
      - ilhrf-data-network
    ports:
      - "8081:8081"
      - "8182:8182"
      - "7687:7687"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: ilhrf-data-backend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      CI: "true"
      # Default user: yugabyte/yugabyte; DB created by scripts/yugabytedb-init/
      DATABASE_URL: "postgresql://yugabyte:yugabyte@yugabytedb-node1:5433/ilhrf_data_collection?schema=public&connect_timeout=30"
      REDIS_URL: "redis://dragonfly:6379"
      CACHE_URL: "redis://dragonfly:6379"
      JWT_SECRET: "${JWT_SECRET:-Ovc5Gigy1KBQiVsNr51tow1fTNojj8aQ2Fwv1JLn+uE=}"
      PORT: 3001
      NODE_ENV: development
      # SeaweedFS S3 configuration
      SEAWEEDFS_S3_HOST: "seaweedfs-s3"
      SEAWEEDFS_S3_PORT: "8333"
      SEAWEEDFS_ACCESS_KEY: "s3admin"
      SEAWEEDFS_SECRET_KEY: "s3secret"
      SEAWEEDFS_BUCKET: "ilhrf-audio"
      SEAWEEDFS_USE_SSL: "false"
      # TimeScaleDB configuration
      TIMESCALEDB_URL: "postgresql://timescale:timescale@timescaledb:5432/timescale"
      # QdrantDB configuration
      QDRANT_URL: "http://qdrant:6333"
      # Neo4j configuration
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4jpassword"
      # Prometheus configuration
      PROMETHEUS_URL: "http://prometheus:9090"
      # OAuth configuration
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-dummy-google-id}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-dummy-google-secret}"
      GOOGLE_CALLBACK_URL: "${GOOGLE_CALLBACK_URL:-http://localhost:5566/api/auth/google/callback}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-dummy-github-id}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-dummy-github-secret}"
      GITHUB_CALLBACK_URL: "${GITHUB_CALLBACK_URL:-http://localhost:5566/api/auth/github/callback}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:5577,http://localhost:5578}"
      CORS_ORIGIN: "${CORS_ORIGIN:-http://localhost:5577,http://localhost:5578,http://localhost:5579}"
      # Email configuration
      SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-noreply@ilhrf.org}"
      # WebSocket configuration
      WS_PORT: "${WS_PORT:-3002}"
      # Export configuration
      EXPORT_STORAGE_BUCKET: "${EXPORT_STORAGE_BUCKET:-exports}"
      EXPORT_RETENTION_DAYS: "${EXPORT_RETENTION_DAYS:-90}"
    ports:
      - "5566:3001"
    depends_on:
      db-init:
        condition: service_completed_successfully
      yugabytedb-node1:
        condition: service_started
      dragonfly:
        condition: service_started
      seaweedfs-s3:
        condition: service_started
      timescaledb:
        condition: service_started
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules
    working_dir: /app
    command:
      [
        "sh",
        "-c",
        'pnpm install && pnpm prisma generate && (for i in $$(seq 1 30); do pnpm exec prisma migrate deploy && exit 0; echo "DB not ready, retry $$i/30 in 3s..."; sleep 3; done; exit 1) && pnpm run start:dev',
      ]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3001/api"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 120s
    networks:
      - ilhrf-data-network

  # Nginx reverse proxy with HTTP/2 and TLS (opt-in via profile)
  # Run: ./scripts/generate-dev-certs.sh && docker compose -f compose.yml -f compose-http2.yml --profile http2 up -d
  # Then access https://localhost (accept self-signed cert in browser)
  # Note: Use `host.docker.internal` in DATABASE_URL for backend to access YugaByteDB
  # when both YugaByteDB and backend run in Docker; use service name only when DB runs outside compose

  nginx:
    image: nginx:alpine
    container_name: ilhrf-data-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certs:/etc/nginx/certs:ro
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    restart: unless-stopped
    profiles:
      - http2
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "-q",
          "--spider",
          "--no-check-certificate",
          "https://localhost/",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - ilhrf-data-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ilhrf-data-frontend
    environment:
      NODE_ENV: development
      # Public API URL for client-side code (browser) - must use localhost with exposed port
      NEXT_PUBLIC_API_URL: "http://localhost:5566/api"
      NEXT_PUBLIC_FRONTEND_URL: "http://localhost:5577"
      # Internal backend URL for server-side API routes (Docker service name)
      BACKEND_INTERNAL_URL: "http://backend:3001/api"
    ports:
      - "5577:3000"
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    working_dir: /app
    command: ["npm", "run", "dev"]
    networks:
      - ilhrf-data-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 90s

  frontend-portfolio:
    build:
      context: ./frontend-portfolio
      dockerfile: Dockerfile
    container_name: ilhrf-data-frontend-portfolio
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_FRONTEND_URL: "http://localhost:5579"
      NEXT_PUBLIC_CROWDSOURCING_URL: "http://localhost:5577"
    ports:
      - "5579:3000"
    command: ["npm", "run", "dev"]
    networks:
      - ilhrf-data-network

  frontend-admin:
    build:
      context: ./frontend-admin
      dockerfile: Dockerfile
    container_name: ilhrf-data-frontend-admin
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: "http://localhost:5566/api"
      NEXT_PUBLIC_FRONTEND_URL: "http://localhost:5578"
    ports:
      - "5578:3000"
    depends_on:
      - backend
    command: ["npm", "run", "dev"]
    networks:
      - ilhrf-data-network

  # # Daily database backup (YugaByteDB/PostgreSQL dump to local volume)
  # backup:
  #   image: postgres:15
  #   container_name: ilhrf-data-backup
