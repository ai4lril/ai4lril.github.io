  #   networks:
  #     - ilhrf-data-network

volumes:
  # postgres_data:  # Uncomment if using PostgreSQL
  yugabyte_data_node1:
  yugabyte_data_node2:
  yugabyte_data_node3:
  dragonfly_data:
  seaweedfs_master_data:
  seaweedfs_volume_data:
  timescaledb_data:
  # qdrant_data:
  # neo4j_data:
  # neo4j_logs:
  prometheus_data:
  grafana_data:

networks:
  ilhrf-data-network:
    driver: bridge
