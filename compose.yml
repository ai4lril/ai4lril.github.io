services:
  # PostgreSQL database (alternative - uncomment if you prefer PostgreSQL)
  postgres:
    image: postgres:15
    container_name: voice-data-postgres
    environment:
      POSTGRES_DB: voice_data_collection
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Dragonfly Cache (High-performance Redis alternative)
  # BullMQ compatibility: --cluster_mode=emulated --lock_on_hashtags enables
  # Lua script execution with queue hashtags (see queue.module.ts)
  dragonfly:
    image: docker.dragonflydb.io/dragonflydb/dragonfly:latest
    container_name: voice-data-dragonfly
    command:
      [
        "--port=6379",
        "--cache_mode=yes",
        "--maxmemory=64GB",
        "--cluster_mode=emulated",
        "--lock_on_hashtags",
      ]
    ports:
      - "6378:6379" # Dragonfly on port 6378 to avoid conflict with YEDIS
    volumes:
      - dragonfly_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-p", "6379", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64GB
        reservations:
          memory: 32GB

  # MinIO for blob storage (S3-compatible)
  minio:
    image: minio/minio:latest
    container_name: voice-data-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9002:9000" # MinIO API
      - "9001:9001" # MinIO Console
    volumes:
      - minio_data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # TimeScaleDB for time-series data
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: voice-data-timescaledb
    environment:
      POSTGRES_DB: timescale
      POSTGRES_USER: timescale
      POSTGRES_PASSWORD: timescale
    ports:
      - "5434:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U timescale -d timescale"]
      interval: 10s
      timeout: 5s
      retries: 5

  # QdrantDB for vector storage (if needed)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: voice-data-qdrant
    ports:
      - "6333:6333" # Qdrant API
      - "6334:6334" # Qdrant gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Neo4j for graph storage (if needed)
  neo4j:
    image: neo4j:5-community
    container_name: voice-data-neo4j
    environment:
      NEO4J_AUTH: neo4j/neo4jpassword
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "7474:7474" # HTTP
      - "7687:7687" # Bolt
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:7474",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: voice-data-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:9090/-/healthy",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # Grafana for monitoring dashboards
  grafana:
    image: grafana/grafana:latest
    container_name: voice-data-grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: grafana-clock-panel
      # Allow provisioning to handle stale datasource refs (fixes "data source not found")
      GF_PROVISIONING_DATASOURCES_ALLOW_DELETE: "true"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    restart: unless-stopped
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3

  # YugaByteDB (default database)
  yugabytedb:
    image: yugabytedb/yugabyte:latest
    container_name: voice-data-yugabyte
    environment:
      YSQL_DB: voice_data_collection
      YSQL_USER: yugabyte
      YSQL_PASSWORD: yugabyte
    ports:
      - "5433:5433" # YSQL port
      - "9042:9042" # YCQL port
      - "6379:6379" # YEDIS port
      - "7001:7000" # Master HTTP
      - "9000:9000" # tserver HTTP
    volumes:
      - yugabyte_data:/opt/yugabyte/data
    restart: unless-stopped
    command:
      ["bin/yugabyted", "start", "--background=false", "--listen=0.0.0.0"]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: voice-data-backend
    environment:
      DATABASE_URL: "postgresql://postgres:postgres@postgres:5432/voice_data_collection?schema=public"
      REDIS_URL: "redis://dragonfly:6379"
      CACHE_URL: "redis://dragonfly:6379"
      JWT_SECRET: "${JWT_SECRET:-Ovc5Gigy1KBQiVsNr51tow1fTNojj8aQ2Fwv1JLn+uE=}"
      PORT: 3001
      NODE_ENV: development
      # MinIO configuration
      MINIO_ENDPOINT: "minio"
      MINIO_PORT: "9000"
      MINIO_ACCESS_KEY: "minioadmin"
      MINIO_SECRET_KEY: "minioadmin"
      MINIO_BUCKET_NAME: "voice-audio"
      MINIO_USE_SSL: "false"
      # TimeScaleDB configuration
      TIMESCALEDB_URL: "postgresql://timescale:timescale@timescaledb:5432/timescale"
      # QdrantDB configuration
      QDRANT_URL: "http://qdrant:6333"
      # Neo4j configuration
      NEO4J_URI: "bolt://neo4j:7687"
      NEO4J_USER: "neo4j"
      NEO4J_PASSWORD: "neo4jpassword"
      # Prometheus configuration
      PROMETHEUS_URL: "http://prometheus:9090"
      # OAuth configuration
      GOOGLE_CLIENT_ID: "${GOOGLE_CLIENT_ID:-dummy-google-id}"
      GOOGLE_CLIENT_SECRET: "${GOOGLE_CLIENT_SECRET:-dummy-google-secret}"
      GOOGLE_CALLBACK_URL: "${GOOGLE_CALLBACK_URL:-http://localhost:5566/api/auth/google/callback}"
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-dummy-github-id}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-dummy-github-secret}"
      GITHUB_CALLBACK_URL: "${GITHUB_CALLBACK_URL:-http://localhost:5566/api/auth/github/callback}"
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:5577}"
      # Email configuration
      SMTP_HOST: "${SMTP_HOST:-smtp.gmail.com}"
      SMTP_PORT: "${SMTP_PORT:-587}"
      SMTP_SECURE: "${SMTP_SECURE:-false}"
      SMTP_USER: "${SMTP_USER:-}"
      SMTP_PASSWORD: "${SMTP_PASSWORD:-}"
      SMTP_FROM: "${SMTP_FROM:-noreply@ilhrf.org}"
      # WebSocket configuration
      WS_PORT: "${WS_PORT:-3002}"
      # Export configuration
      EXPORT_STORAGE_BUCKET: "${EXPORT_STORAGE_BUCKET:-exports}"
      EXPORT_RETENTION_DAYS: "${EXPORT_RETENTION_DAYS:-90}"
    ports:
      - "5566:3001"
    depends_on:
      - postgres
      - dragonfly
      - minio
      - timescaledb
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules
    working_dir: /app
    command:
      ["sh", "-c", "pnpm install && pnpm prisma generate && pnpm run start:dev"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://backend:3001/api"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Daily database backup (PostgreSQL dump to local volume)
  backup:
    image: postgres:15
    container_name: voice-data-backup
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: voice_data_collection
      BACKUP_RETENTION_DAYS: "${BACKUP_RETENTION_DAYS:-7}"
    volumes:
      - ./backups:/backups
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Backup service started. Running backup every 24 hours."
        while true; do
          ts=$$(date +%Y%m%d_%H%M%S)
          echo "[$$(date)] Creating backup..."
          pg_dump -h postgres -U postgres voice_data_collection --no-owner --no-acl | gzip > /backups/voice_data_collection_$$ts.sql.gz && echo "[$$(date)] Backup created" || echo "[$$(date)] Backup failed"
          find /backups -name "voice_data_collection_*.sql.gz" -mtime +$${BACKUP_RETENTION_DAYS:-7} -delete 2>/dev/null || true
          sleep 86400
        done
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - backup # Run with: docker compose --profile backup up -d

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: voice-data-frontend
    environment:
      NODE_ENV: development
      # Public API URL for client-side code (browser) - must use localhost with exposed port
      NEXT_PUBLIC_API_URL: "http://localhost:5566/api"
      NEXT_PUBLIC_FRONTEND_URL: "http://localhost:5577"
      # Internal backend URL for server-side API routes (Docker service name)
      BACKEND_INTERNAL_URL: "http://backend:3001/api"
    ports:
      - "5577:3000"
    depends_on:
      - backend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    working_dir: /app
    command: ["npm", "run", "dev"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data:
  yugabyte_data:
  dragonfly_data:
  minio_data:
  timescaledb_data:
  qdrant_data:
  neo4j_data:
  neo4j_logs:
  prometheus_data:
  grafana_data:
