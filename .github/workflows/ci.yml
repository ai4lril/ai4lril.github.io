name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/voice_data_collection"

      - name: Lint backend
        run: pnpm run lint:check

  backend-build:
    runs-on: ubuntu-latest
    needs: backend-lint
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/voice_data_collection"

      - name: Build backend
        run: pnpm exec nest build

  frontend-lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint frontend
        run: pnpm run lint

  frontend-build:
    runs-on: ubuntu-latest
    needs: frontend-lint
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm run build
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:5566/api"
          NEXT_PUBLIC_FRONTEND_URL: "http://localhost:5577"

  frontend-test:
    runs-on: ubuntu-latest
    needs: frontend-build
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Run frontend tests
        run: pnpm test:coverage
        env:
          NEXT_PUBLIC_API_URL: "http://localhost:5566/api"
          NEXT_PUBLIC_FRONTEND_URL: "http://localhost:5577"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/lcov.info
          if-no-files-found: ignore

  backend-test:
    runs-on: ubuntu-latest
    needs: backend-build
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: voice_data_collection
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    defaults:
      run:
        working-directory: ./backend
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: backend/pnpm-lock.yaml

      - name: Install backend dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm prisma generate

      - name: Run migrations
        run: pnpm prisma migrate deploy
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/voice_data_collection"

      - name: Start SeaweedFS
        run: |
          docker run -d -p 8333:8333 --name seaweedfs \
            -e AWS_ACCESS_KEY_ID=s3admin \
            -e AWS_SECRET_ACCESS_KEY=s3secret \
            chrislusf/seaweedfs:latest server -filer -s3 -ip=0.0.0.0
          sleep 5

      - name: Run backend tests
        run: pnpm test:cov
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/voice_data_collection"
          JWT_SECRET: "test-secret"
          CACHE_URL: "redis://localhost:6379"
          REDIS_URL: "redis://localhost:6379"
          SEAWEEDFS_S3_HOST: "localhost"
          SEAWEEDFS_S3_PORT: "8333"
          SEAWEEDFS_ACCESS_KEY: "s3admin"
          SEAWEEDFS_SECRET_KEY: "s3secret"
          SEAWEEDFS_BUCKET: "voice-audio"
          SEAWEEDFS_USE_SSL: "false"

      - name: Run backend integration tests
        run: pnpm test:integration
        env:
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/voice_data_collection"
          JWT_SECRET: "test-secret"
          CACHE_URL: "redis://localhost:6379"
          REDIS_URL: "redis://localhost:6379"
          SEAWEEDFS_S3_HOST: "localhost"
          SEAWEEDFS_S3_PORT: "8333"
          SEAWEEDFS_ACCESS_KEY: "s3admin"
          SEAWEEDFS_SECRET_KEY: "s3secret"
          SEAWEEDFS_BUCKET: "voice-audio"
          SEAWEEDFS_USE_SSL: "false"

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage/lcov.info
          if-no-files-found: ignore
